# ─── docker-compose.yml ──────────────────────────────────────────────────────
# Claude Discord 봇 컨테이너 구성
# 대상 플랫폼: linux/arm/v7 (Odroid-XU4)
# ─────────────────────────────────────────────────────────────────────────────

services:
  claude-discord:
    build: .
    # Odroid-XU4 (ARMv7) 아키텍처 명시
    platform: linux/arm/v7
    container_name: claude-discord
    # 비정상 종료 시 자동 재시작 (수동 stop은 재시작하지 않음)
    restart: unless-stopped
    # 환경변수는 .env 파일에서 로드
    env_file: .env
    volumes:
      # SQLite DB 및 영속 데이터를 호스트와 공유
      - ./data:/app/data
      # Claude CLI 인증 정보 마운트 (호스트에서 `claude auth login` 선행 필요)
      - ~/.claude:/home/node/.claude
      # MCP 스킬 목록 — 호스트에서 수정 후 restart만으로 반영 (재빌드 불필요)
      - ./mcp-skills.json:/app/mcp-skills.json:ro
    # 루트 파일시스템을 읽기 전용으로 마운트 (보안 강화)
    read_only: true
    tmpfs:
      # 임시 파일 전용 tmpfs (읽기 전용 FS 대응)
      - /tmp
    cap_drop:
      # 모든 Linux Capabilities 제거 (최소 권한 원칙)
      - ALL
    security_opt:
      # setuid/setgid 비트를 통한 권한 상승 차단
      - no-new-privileges:true
