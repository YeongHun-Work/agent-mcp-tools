services:
  agent-auto-memo:
    build: .
    image: agent-auto-memo:latest
    container_name: agent-auto-memo
    # stdio 방식을 위해 stdin(i)과 tty(t) 오픈 유지 (필수)
    stdin_open: true
    tty: true
    # SSE 모드를 위해 8000번 포트 개방 (MCP_TRANSPORT=stdio 일 땐 무시됨)
    ports:
      - "8000:8000"
    # 설정 파일 주입
    env_file:
      - .env
    # 옵시디언 볼트 폴더를 컨테이너 내부로 마운트 (호스트경로:컨테이너경로 일치 권장)
    volumes:
      - /data/workspace/obsidian:/data/workspace/obsidian
    restart: unless-stopped
